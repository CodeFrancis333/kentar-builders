<!doctype html>
<html lang="en">

    <meta
      name="description"
      content="KenTar-Builders & Engineering Services provides structural engineering, construction, plumbing, and design-build solutions across the Philippines."

    <link rel="icon" type="image/png" href="/favicon.png" />

  <body class="bg-white">
    <form name="project-inquiry" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>

    <div id="root"></div>
